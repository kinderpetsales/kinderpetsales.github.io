<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>댕냥이 유치원 프로필</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        h1 { text-align: center; color: #333; }
        
        /* 카테고리 탭 디자인 */
        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            gap: 10px;
        }
        .tab-btn {
            padding: 10px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background-color: #ddd;
            color: #555;
            transition: 0.3s;
        }
        .tab-btn.active { background-color: #ff9800; color: white; }
        
        /* 빈 화면(데이터 없음) 안내 텍스트 */
        .empty-state {
            text-align: center;
            color: #999;
            grid-column: 1 / -1;
            padding: 50px;
            font-size: 18px;
            font-weight: bold;
        }

        /* 포스트잇 그리드 레이아웃 */
        .memo-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 포스트잇 디자인 */
        .post-it {
            background-color: #feff9c;
            width: 100%;
            height: 250px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 3px 5px 10px rgba(0,0,0,0.15);
            position: relative;
            display: flex;
            flex-direction: column;
            transform: rotate(-1deg);
            transition: transform 0.2s;
        }
        .post-it:nth-child(even) { transform: rotate(1deg); }
        .post-it:hover { transform: scale(1.05); z-index: 10; }
        
        .name { font-size: 22px; font-weight: bold; border-bottom: 2px solid #e0c55f; padding-bottom: 5px; margin-bottom: 10px;}
        .hw { font-size: 14px; color: #555; margin-bottom: 10px; }
        
        /* 소개 내용 부분 (줄바꿈 인식 추가) */
        .intro { 
            flex-grow: 1; 
            font-size: 15px; 
            line-height: 1.4; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            display: -webkit-box; 
            -webkit-line-clamp: 4; 
            -webkit-box-orient: vertical; 
            white-space: pre-wrap; /* 카톡 줄바꿈을 웹에서도 인식하게 하는 마법의 코드 */
        }
        
        /* 하단 정보 (월 / 번호 / 링크) */
        .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 12px; color: #666; font-weight: bold;}
        .link-btn { background-color: #4CAF50; color: white; text-decoration: none; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>

    <h1>🐾 댕냥이 유치원 분양 프로필 🐾</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="filterCategory('강아지', this)">🐶 강아지</button>
        <button class="tab-btn" onclick="filterCategory('고양이', this)">🐱 고양이</button>
    </div>

    <div class="memo-container" id="memo-board">
        </div>

    <script>
        // 🛑 중요: 복사해두신 본인의 주소와 anon 키를 아래 따옴표 안에 정확히 넣어주세요!
        // 주소 맨 끝에 ?select=* 가 지워지지 않도록 주의하세요.
        const SUPABASE_URL = "https://ivqyxdtmyqopjlfaxdrj.supabase.co/rest/v1/";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2cXl4ZHRteXFvcGpsZmF4ZHJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NDQzMjYsImV4cCI6MjA5ODEyMDMyNn0.cVLJ8vIAwPZp7CarO_J_fY4kGai4Yoe3yOvF-zjCBPQ";

        let allMemos = [];

        async function loadMemos() {
            try {
                // 수파베이스는 반드시 헤더에 열쇠를 넣어서 요청해야 합니다.
                const response = await fetch(SUPABASE_URL, {
                    method: "GET",
                    headers: {
                        "apikey": SUPABASE_ANON_KEY,
                        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
                        "Content-Type": "application/json"
                    }
                });

                if (!response.ok) {
                    throw new Error(`통신 에러: ${response.status}`);
                }

                const data = await response.json();
                
                if (data && !data.error) {
                    allMemos = data; // 파이어베이스와 달리 데이터가 이미 배열([])로 들어옵니다.
                    renderMemos('강아지'); // 처음 켰을 때 '강아지' 기본 렌더링
                } else {
                    console.error("데이터 오류:", data.error);
                }
            } catch (error) {
                console.error("서버와 통신하는 중 오류 발생:", error);
                document.getElementById('memo-board').innerHTML = '<div class="empty-state">⚠️ 데이터를 불러오지 못했습니다. 주소와 키를 확인해주세요.</div>';
            }
        }

        function filterCategory(category, element) {
            // 버튼 색상 변경 로직
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            
            // 클릭한 카테고리만 화면에 그리기
            renderMemos(category);
        }

        function renderMemos(category) {
            const board = document.getElementById('memo-board');
            board.innerHTML = ''; 

            const filteredMemos = allMemos.filter(memo => memo.category === category);
            
            // 데이터가 한 개도 없을 때 휑해 보이지 않도록 방어 코드
            if (filteredMemos.length === 0) {
                board.innerHTML = `<div class="empty-state">아직 등록된 ${category} 프로필이 없어요! 😢</div>`;
                return;
            }

            filteredMemos.forEach(memo => {
                const postIt = document.createElement('div');
                postIt.className = 'post-it';
                
                // 번호 파싱 에러 방지 (숫자로 들어올 경우를 대비해 문자로 강제 변환)
                const displayId = memo.id ? String(memo.id).slice(-4) : "0000";
                
                postIt.innerHTML = `
                    <div class="name">${memo.name}</div>
                    <div class="hw">📏 ${memo.hw}</div>
                    <div class="intro">${memo.intro}</div>
                    <div class="footer">
                        <span>📅 ${memo.month}월 분양</span>
                        <a href="${memo.link}" target="_blank" class="link-btn">오픈톡 연결</a>
                        <span>#${displayId}</span>
                    </div>
                `;
                board.appendChild(postIt);
            });
        }

        // 창이 켜지자마자 데이터 불러오기 시작
        window.onload = loadMemos;
    </script>
</body>
</html>
